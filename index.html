<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sebha</title>

<link rel="icon" type="image/x-icon" href="./sebha.png">

<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@100..900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/earlyaccess/amiri.css" rel="stylesheet">

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>

<style>

*{
    font-family: Amiri, serif;
    box-sizing: border-box;
}

body{
    background-image: linear-gradient(to left,#073f74 0%,#920848 74%);
    height: 100vh;
    direction: rtl;
    padding: 0 50px;
    margin: 0;
    overflow: hidden;
}

.start{
    width: 200px;
    background: rgba(8,12,84,.232);
    backdrop-filter: blur(20px);
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    font-size: 27px;
    border: 1px solid transparent;
    border-radius: 999px;
    margin: 20px;
    padding: 5px;
}

.start:hover{
    box-shadow: 0 0 20px #fff;
}

.reload{
    width: 200px;
    background-color: #e4030348;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    font-size: 27px;
    border: 1px solid transparent;
    border-radius: 999px;
    margin: 20px;
}

.reload:hover{
    box-shadow: 0 0 20px #fff;
}

.circles{
    background: transparent;
    backdrop-filter: blur(20px);
    width: 27px;
    height: 27px;
    margin: 0px 10px;
    border-radius: 999px;
    border: 1px solid #ffffff88;
}

.add{
    background-image: linear-gradient(200deg,#f5f1f5 0%,transparent 90%);
    filter: blur(1px);
    box-shadow: 0 0 2px #f5f1f5;
}

#zero,
.count{
    color: #fff;
    font-size: 40px;
    margin: auto;
    width: 100%;
    text-align: center;
    font-weight: bold;
    padding-top: 10px;
    padding-bottom: 30px;
}

.buttons{
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.sebha-container{
    width: 100%;
    height: 150px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
}

.developer{
    z-index: 999;
    position: absolute;
    text-align: center;
    width: 200px;
    left: 50%;
    transform: translateX(-50%);
    bottom: 1px;
}

.developer h6,
.developer a{
    color: #fff;
    text-decoration: none;
}

</style>
</head>

<body>

<div style="display:flex;justify-content:center;align-items:center;">
    <h1 style="color:#f1eeee;text-align:center;font-size:50px;">
        تسبيح
    </h1>

    <img src="./sebha.png"
         style="width:150px;margin-right:30px"
         alt="Sebha">
</div>

<hr>
<br>

<div class="sebha-container" id="sebhaContainer">
</div>

<div class="buttons">
    <button class="start">إبدأ</button>
    <button class="reload">إعادة</button>
</div>

<div id="zero">0</div>

<div class="developer">
    <h6>
        Developed By
        <a href="https://abdallahweb.github.io/resume/">
            Abdallah Fouad
        </a>
    </h6>
</div>

<script>

const maxTasbeeh = 100;
let count = 0;

const container = document.getElementById("sebhaContainer");

for(let i = 0; i < maxTasbeeh; i++){

    const circle = document.createElement("div");
    circle.className = "circles";

    container.appendChild(circle);
}

const circles = document.querySelectorAll(".circles");

function updateCounter(){

    $("#zero").text(count  + " " + "تسبيحة");

    circles.forEach((circle,index)=>{

        if(index < count){
            circle.classList.add("add");
        }else{
            circle.classList.remove("add");
        }

    });
}

$(".start").on("click", function(){

    if(count >= maxTasbeeh) return;

    count++;
    updateCounter();

});

$(".reload").on("click", function(){

    count = 0;
    updateCounter();

});

updateCounter();

</script>

<script src="query.js"></script>
<script>
document.onkeydown = function(e) {
return !e.ctrlKey || 67 !== e.keyCode && 86 !== e.keyCode && 85 !== e.keyCode && 117 !== e.keyCode
}, $(document).keypress("u", function(e) {
return !e.ctrlKey
}), document.addEventListener("contextmenu", function(e) {
e.preventDefault()
}, !1), $(document).keydown(function(e) {
return 123 != e.keyCode && ((!e.ctrlKey || !e.shiftKey || 73 != e.keyCode) && void 0)
})
</script>
</body>
</html>
